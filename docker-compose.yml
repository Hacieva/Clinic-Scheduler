services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_pass}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinic_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8000"
      DATABASE_URL: postgres://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD:-clinic_pass}@postgres:5432/${POSTGRES_DB:-clinic_db}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "8000:8000"
    networks:
      - clinic_net
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      API_URL: ${API_URL:-http://backend:8000}
    networks:
      - clinic_net
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    networks:
      - clinic_net
    depends_on:
      - backend

networks:
  clinic_net:
    driver: bridge

volumes:
  postgres_data:
