services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_pass}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinic_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8000"
      DATABASE_URL: postgres://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD:-clinic_pass}@postgres:5432/${POSTGRES_DB:-clinic_db}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      BOT_API_SECRET: ${BOT_API_SECRET}
    networks:
      - clinic_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgres://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD:-clinic_pass}@postgres:5432/${POSTGRES_DB:-clinic_db}?sslmode=disable
      BACKEND_URL: http://backend:8000
      BOT_API_SECRET: ${BOT_API_SECRET}
    networks:
      - clinic_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    networks:
      - clinic_net
    restart: unless-stopped
    depends_on:
      - backend

networks:
  clinic_net:
    driver: bridge

volumes:
  postgres_data:
