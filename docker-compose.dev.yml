services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    environment:
      AIR_VERSION: "1.52.3"
    ports:
      - "8000:8000"

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile.dev
    volumes:
      - ./bot:/app
    ports: []

  frontend:
    build: null
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000

  postgres:
    ports:
      - "5432:5432"
